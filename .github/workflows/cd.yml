name: Store CD

on:
  push:
    branches:
      - production
      - develop
  workflow_dispatch:

env:
  flutter_version: '3.38.x'
  java_version: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_code: ${{ steps.get_version_code.outputs.version_code }}
      is_production: ${{ github.ref == 'refs/heads/production' }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Get version code from variable
        id: get_version_code
        run: |
          echo "version_code=${{ vars.VERSION_CODE }}" >> $GITHUB_OUTPUT
          echo "Using version code: ${{ vars.VERSION_CODE }}"

  deploy_android:
    name: Android Play Store
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.java_version }}
      - name: Decrypt Android keys
        run: sh ./.github/scripts/decrypt_android_keys.sh
        env:
          KEYS_SECRET_PASSPHRASE: ${{ secrets.KEYS_SECRET_PASSPHRASE }}
      - name: Generate changelog
        run: bash "$GITHUB_WORKSPACE/.github/scripts/generate_changelog.sh" ${{ needs.prepare.outputs.version_code }} android
        working-directory: ./android/fastlane
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - run: flutter pub get
      - name: Build Android app bundle
        run: flutter build appbundle --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Install Fastlane
        run: gem install fastlane fastlane-plugin-flutter_version
      - name: Run Fastlane
        run: fastlane ${{ needs.prepare.outputs.is_production == 'true' && 'playstore' || 'beta' }}
        working-directory: ./android

  deploy_ios:
    name: iOS Deploy TestFlight
    needs: prepare
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.java_version }}
      - name: Generate changelog
        run: bash "$GITHUB_WORKSPACE/.github/scripts/generate_changelog.sh" ${{ needs.prepare.outputs.version_code }} ios
        working-directory: ./ios/fastlane
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Flutter Initialize
        run: flutter doctor -v
      - run: flutter pub get
      - name: Build iOS
        run: flutter build ipa --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Zip dSYM
        run: zip Runner.app.dSYM.zip -r ../archive/Runner.xcarchive/dSYMs/
        working-directory: ./build/ios/ipa
      - name: Decode API Key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ios/AuthKey.p8
      - name: Deploy iOS to TestFlight via Fastlane
        run: fastlane ios release key_id:"${{ env.KEY_ID }}" issuer_id:"${{ env.ISSUER_ID }}"
        working-directory: ./ios
        env:
          APP_STORE_CONNECT_TEAM_ID: '${{ secrets.APP_STORE_CONNECT_TEAM_ID }}'
          APP_STORE_CONNECT_APPLE_ID: '${{ secrets.APP_STORE_CONNECT_APPLE_ID }}'
          APP_STORE_CONNECT_BUNDLE_IDENTIFIER: '${{ secrets.APP_STORE_CONNECT_BUNDLE_IDENTIFIER }}'
          DEVELOPER_PORTAL_TEAM_ID: '${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}'
          KEY_ID: '${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}'
          ISSUER_ID: '${{ secrets.APP_STORE_CONNECT_API_API_ISSUER_ID }}'

  deploy_macos:
    name: macOS Deploy TestFlight
    needs: prepare
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Flutter Initialize
        run: flutter doctor -v
      - run: flutter pub get
      - name: Generate changelog
        run: bash "$GITHUB_WORKSPACE/.github/scripts/generate_changelog.sh" ${{ needs.prepare.outputs.version_code }} macos
        working-directory: ./macos/fastlane
      - name: Build macOS
        run: flutter build macos --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Decode API Key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > macos/AuthKey.p8
      - name: Deploy macOS to TestFlight via Fastlane
        run: fastlane mac release key_id:"${{ env.KEY_ID }}" issuer_id:"${{ env.ISSUER_ID }}"
        working-directory: ./macos
        env:
          APP_STORE_CONNECT_TEAM_ID: '${{ secrets.APP_STORE_CONNECT_TEAM_ID }}'
          APP_STORE_CONNECT_MACOS_BUNDLE_IDENTIFIER: 'com.nkust.ap.flutter'
          MAC_INSALLER_DISTRIBUTION_CERT_NAME: '${{ secrets.MAC_INSALLER_DISTRIBUTION_CERT_NAME }}'
          DEVELOPER_PORTAL_TEAM_ID: '${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}'
          KEY_ID: '${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}'
          ISSUER_ID: '${{ secrets.APP_STORE_CONNECT_API_API_ISSUER_ID }}'

  deploy_windows:
    name: Windows App
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - run: flutter doctor -v
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Build Inno Setup installer
        run: iscc /DMyAppVersion="${{ needs.prepare.outputs.version }}" windows\installer.iss
      - name: Zip portable
        run: powershell Compress-Archive build\windows\x64\runner\Release\ windows.zip
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-artifact
          path: build/windows/installer/nkust_ap_installer.exe
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-artifact
          path: windows.zip

  deploy_linux:
    name: Linux App
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Install required dependencies
        run: sudo apt -y install clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Zip files
        run: tar -czf linux.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: linux.tar.gz
      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic
        continue-on-error: true
      - name: Build Snap
        if: success()
        run: snapcraft --destructive-mode
        continue-on-error: true
      - name: Upload to Snap Store
        if: success()
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -n "$SNAPCRAFT_STORE_CREDENTIALS" ]; then
            snapcraft upload --release=edge *.snap
          else
            echo "SNAPCRAFT_STORE_CREDENTIALS not set, skipping Snap Store upload"
          fi
        continue-on-error: true
      - name: Upload snap artifact
        if: hashFiles('*.snap') != ''
        uses: actions/upload-artifact@v4
        with:
          name: linux-snap-artifact
          path: "*.snap"

  github_release:
    name: Create GitHub Release
    needs: [prepare, deploy_android, deploy_ios, deploy_macos, deploy_windows, deploy_linux]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Generate release notes
        run: bash "$GITHUB_WORKSPACE/.github/scripts/generate_changelog.sh" ${{ needs.prepare.outputs.version_code }} github
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-artifact
      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: windows-portable-artifact
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: linux-artifact
      - name: Download Linux snap artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: linux-snap-artifact
      - name: Rename artifacts
        run: |
          mv nkust_ap_installer.exe nkust_ap_windows_setup.exe
          mv windows.zip nkust_ap_windows_portable.zip
          mv linux.tar.gz nkust_ap_linux.tar.gz
          mv *.snap nkust_ap_linux.snap || true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}${{ github.ref != 'refs/heads/production' && '-beta' || '' }}+${{ needs.prepare.outputs.version_code }}
          name: v${{ needs.prepare.outputs.version }}${{ github.ref != 'refs/heads/production' && '-beta' || '' }}+${{ needs.prepare.outputs.version_code }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES_GENERATED.md
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/production' }}
          files: |
            nkust_ap_windows_setup.exe
            nkust_ap_windows_portable.zip
            nkust_ap_linux.tar.gz
            nkust_ap_linux.snap

  finalize:
    name: Increment Version Code
    needs: [prepare, deploy_android, deploy_ios, deploy_macos, deploy_windows, deploy_linux, github_release]
    if: always() && needs.github_release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Increment VERSION_CODE
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CURRENT=${{ needs.prepare.outputs.version_code }}
          NEXT=$((CURRENT + 1))
          gh variable set VERSION_CODE --body "$NEXT" --repo "${{ github.repository }}"
          echo "Version code incremented: $CURRENT -> $NEXT"
