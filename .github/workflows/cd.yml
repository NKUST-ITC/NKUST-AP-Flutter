name: Store CD

on:
  push:
    branches:
      - master
      - develop

env:
  flutter_version: '3.35.x'
  java_version: '21'

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_code: ${{ steps.get_version_code.outputs.version_code }}
      is_production: ${{ github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Get version code from variable
        id: get_version_code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_CODE=$(gh api "repos/${{ github.repository }}/actions/variables/VERSION_CODE" --jq '.value')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Using version code: $VERSION_CODE"

  deploy_android:
    name: Android Play Store
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.java_version }}
      - name: Decrypt Android keys
        run: sh ./.github/scripts/decrypt_android_keys.sh
        env:
          KEYS_SECRET_PASSPHRASE: ${{ secrets.KEYS_SECRET_PASSPHRASE }}
      - name: Generate changelog
        run: bash ./.github/scripts/generate_changelog.sh ${{ needs.prepare.outputs.version_code }} android
        working-directory: ./android/fastlane
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Decrypt dev configs
        run: sh ./scripts/decrypt_dev_configs.sh
        env:
          DEV_CONFIGS_PASSPHRASE: ${{ secrets.DEV_CONFIGS_PASSPHRASE }}
      - run: flutter pub get
      - name: Build Android app bundle
        run: flutter build appbundle --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Bundle install
        run: bundle install
        working-directory: ./android
      - name: Run Fastlane
        uses: maierj/fastlane-action@v3.1.0
        with:
          lane: ${{ needs.prepare.outputs.is_production == 'true' && 'playstore' || 'beta' }}
          subdirectory: 'android'

  deploy_ios:
    name: iOS Deploy TestFlight
    needs: prepare
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.java_version }}
      - name: Generate changelog
        run: bash ./.github/scripts/generate_changelog.sh ${{ needs.prepare.outputs.version_code }} ios
        working-directory: ./ios/fastlane
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Flutter Initialize
        run: flutter doctor -v
      - name: Decrypt dev configs
        run: sh ./scripts/decrypt_dev_configs.sh
        env:
          DEV_CONFIGS_PASSPHRASE: ${{ secrets.DEV_CONFIGS_PASSPHRASE }}
      - run: flutter pub get
      - name: Build iOS
        run: flutter build ipa --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Zip dSYM
        run: zip Runner.app.dSYM.zip -r ../archive/Runner.xcarchive/dSYMs/
        working-directory: ./build/ios/ipa
      - name: Decode API Key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ios/AuthKey.p8
      - name: Deploy iOS to TestFlight via Fastlane
        run: fastlane ios release key_id:"${{ env.KEY_ID }}" issuer_id:"${{ env.ISSUER_ID }}"
        working-directory: ./ios
        env:
          APP_STORE_CONNECT_TEAM_ID: '${{ secrets.APP_STORE_CONNECT_TEAM_ID }}'
          APP_STORE_CONNECT_APPLE_ID: '${{ secrets.APP_STORE_CONNECT_APPLE_ID }}'
          APP_STORE_CONNECT_BUNDLE_IDENTIFIER: '${{ secrets.APP_STORE_CONNECT_BUNDLE_IDENTIFIER }}'
          DEVELOPER_PORTAL_TEAM_ID: '${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}'
          KEY_ID: '${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}'
          ISSUER_ID: '${{ secrets.APP_STORE_CONNECT_API_API_ISSUER_ID }}'

  deploy_macos:
    name: macOS Deploy TestFlight
    needs: prepare
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Flutter Initialize
        run: flutter doctor -v
      - name: Decrypt dev configs
        run: sh ./scripts/decrypt_dev_configs.sh
        env:
          DEV_CONFIGS_PASSPHRASE: ${{ secrets.DEV_CONFIGS_PASSPHRASE }}
      - run: flutter pub get
      - name: Generate changelog
        run: bash ./.github/scripts/generate_changelog.sh ${{ needs.prepare.outputs.version_code }} ios
        working-directory: ./macos/fastlane
      - name: Build macOS
        run: flutter build macos --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Decode API Key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > macos/AuthKey.p8
      - name: Deploy macOS to TestFlight via Fastlane
        run: fastlane mac release key_id:"${{ env.KEY_ID }}" issuer_id:"${{ env.ISSUER_ID }}"
        working-directory: ./macos
        env:
          APP_STORE_CONNECT_TEAM_ID: '${{ secrets.APP_STORE_CONNECT_TEAM_ID }}'
          APP_STORE_CONNECT_MACOS_BUNDLE_IDENTIFIER: 'com.nkust.ap.flutter'
          DEVELOPER_PORTAL_TEAM_ID: '${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}'
          KEY_ID: '${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}'
          ISSUER_ID: '${{ secrets.APP_STORE_CONNECT_API_API_ISSUER_ID }}'

  deploy_windows:
    name: Windows App
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Decrypt dev configs
        run: sh ./scripts/decrypt_dev_configs.sh
        env:
          DEV_CONFIGS_PASSPHRASE: ${{ secrets.DEV_CONFIGS_PASSPHRASE }}
      - run: flutter doctor -v
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Zip files
        run: powershell Compress-Archive build\windows\x64\runner\Release\ windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: windows.zip

  deploy_linux:
    name: Linux App
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Decrypt dev configs
        run: sh ./scripts/decrypt_dev_configs.sh
        env:
          DEV_CONFIGS_PASSPHRASE: ${{ secrets.DEV_CONFIGS_PASSPHRASE }}
      - name: Install required dependencies
        run: sudo apt -y install clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Zip files
        run: tar -czf linux.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: linux.tar.gz

  github_release:
    name: Create GitHub Release
    needs: [prepare, deploy_android, deploy_ios, deploy_macos, deploy_windows, deploy_linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Generate release notes
        run: bash ./.github/scripts/generate_changelog.sh ${{ needs.prepare.outputs.version_code }} github
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
      - name: Rename artifacts
        run: |
          mv windows.zip nkust_ap_windows.zip
          mv linux.tar.gz nkust_ap_linux.tar.gz
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.version_code }}
          name: v${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES_GENERATED.md
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/master' }}
          files: |
            nkust_ap_windows.zip
            nkust_ap_linux.tar.gz

  finalize:
    name: Increment Version Code
    needs: [prepare, deploy_android, deploy_ios, deploy_macos, deploy_windows, deploy_linux, github_release]
    runs-on: ubuntu-latest
    steps:
      - name: Increment VERSION_CODE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=${{ needs.prepare.outputs.version_code }}
          NEXT=$((CURRENT + 1))
          gh api --method PATCH "repos/${{ github.repository }}/actions/variables/VERSION_CODE" \
            -f name="VERSION_CODE" \
            -f value="$NEXT"
          echo "Version code incremented: $CURRENT -> $NEXT"
